        .container {

            margin: 20px auto;

        /* --- KHU VỰC VIDEO BANNER --- */
        .video-banner-container {
            width: 100%;

            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;

        .video-title {

        /* Lớp phủ tạo giao diện Player */

            width: 100%;

            background-size: cover;
            background-position: center;
            cursor: pointer;
            position: relative;
        }

        /* Nút Play giả lập */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #fff;
            transition: all 0.3s ease;
        }

        .play-button:hover {
            background-color: rgba(255, 0, 0, 0.9); /* Màu đỏ khi di chuột vào */
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* Hình tam giác nút play */
        .play-button::after {
            content: '';
            display: block;
            box-sizing: border-box;
            border-style: solid;
            border-width: 20px 0 20px 30px;
            border-color: transparent transparent transparent #fff;
            margin-left: 10px;
        }
        
        /* Timebar giả lập */
        .fake-control-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            color: #fff;
            font-size: 0.8rem;
        }
        .fake-progress {
            flex-grow: 1;
            height: 4px;
            background-color: rgba(255,255,255,0.3);
            margin: 0 10px;
            border-radius: 2px;
            position: relative;
        }
        .fake-progress-current {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5%; /* Phần trăm "đã tải" giả */
            background-color: #ff0000;
            border-radius: 2px;
        }

        /* --- KHU VỰC QUẢNG CÁO --- */

            color: #888;

        }
